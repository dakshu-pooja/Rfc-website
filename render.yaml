services:
  # Backend Web Service
  - type: web
    name: rfc-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: PORT
        value: 10000

  # Frontend Static Site
  - type: static
    name: rfc-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: rfc-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
